<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Landmark Explorer AI</title>
    <link rel="stylesheet" href="https://cdnjs.cloudflare.com/ajax/libs/font-awesome/6.4.0/css/all.min.css">
    <link rel="stylesheet" href="style.css">
    <!-- TensorFlow.js and MobileNet AI Model -->
    <script src="https://cdn.jsdelivr.net/npm/@tensorflow/tfjs@latest"></script>
    <script src="https://cdn.jsdelivr.net/npm/@tensorflow-models/mobilenet@latest"></script>
</head>
<body>

    <header>
        <div class="container">
            <h1><i class="fas fa-landmark"></i> Landmark Explorer</h1>
            <div class="search-upload-container">
                <div class="upload-container">
                    <input type="file" id="imageUpload" accept="image/*" style="display:none">
                    <label for="imageUpload" class="upload-btn">
                        <i class="fas fa-camera"></i> Upload Landmark
                    </label>
                </div>
            </div>
        </div>
    </header>

    <main class="container">
        <!-- Detection Result Section -->
        <section id="detectionResult" class="detection-result" style="display: none;">
            <div class="detection-card">
                <img id="detectedImage" src="" alt="Landmark" class="detected-image">
                <div class="detection-info">
                    <h3 id="detectedName">Processing...</h3>
                    <div id="detectionDetails"></div>
                </div>
            </div>
        </section>

        <!-- Upload Hero -->
        <section class="hero-section">
            <div class="hero-content">
                <h2>AI Global Tour Guide</h2>
                <p>Identify any monument and get travel tips instantly.</p>
                <div id="uploadZone" class="upload-zone">
                    <i class="fas fa-cloud-upload-alt"></i>
                    <p id="statusText">Waiting for AI to load...</p>
                </div>
            </div>
        </section>
    </main>

    <!-- Loading Overlay -->
    <div id="loading" class="loading">
        <i class="fas fa-spinner fa-spin"></i>
        <div>AI is scanning the landmark...</div>
    </div>

    <script src="script.js"></script>
</body>
</html>
