<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Landmark AI Detector</title>
    <link rel="stylesheet" href="style.css">
    <link href="https://cdnjs.cloudflare.com/ajax/libs/font-awesome/6.4.0/css/all.min.css" rel="stylesheet">
    <script src="https://cdn.jsdelivr.net/npm/@tensorflow/tfjs@latest/dist/tf.min.js"></script>
    <script src="https://cdn.jsdelivr.net/npm/@tensorflow-models/mobilenet"></script>
</head>
<body>
    <header>
        <div class="container">
            <h1><i class="fas fa-robot"></i> Landmark AI</h1>
            <div class="controls">
                <input type="file" id="imageUpload" accept="image/*" hidden>
                <label for="imageUpload" class="upload-btn">
                    <i class="fas fa-camera"></i> Upload Image
                </label>
                <input type="text" id="searchInput" placeholder="Search landmarks...">
            </div>
        </div>
    </header>

    <div class="detection-result" id="detectionResult" style="display:none;">
        <div class="container">
            <h2>🎉 AI Detected!</h2>
            <div class="detection-card">
                <img id="detectedImage">
                <div>
                    <h3 id="detectedName"></h3>
                    <div id="detectionDetails"></div>
                </div>
            </div>
        </div>
    </div>

    <main class="container">
        <section class="upload-zone" id="uploadZone">
            <i class="fas fa-cloud-upload-alt"></i>
            <h2>Drag photo or click to upload</h2>
            <p>AI will detect landmark instantly!</p>
        </section>
        <section id="landmarksGrid">
            <h2>Popular Landmarks</h2>
        </section>
    </main>

    <div class="loading" id="loading">
        <i class="fas fa-spinner fa-spin"></i> AI Analyzing...
    </div>

    <script src="script.js"></script>
</body>
</html>
